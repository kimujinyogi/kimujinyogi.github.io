<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ことばカード</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: #5c8fc7;
      color: white;
      text-align: center;
      padding: 14px 16px;
      font-size: 1.4rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    /* コントロールエリア（sticky） */
    #controls {
      position: sticky;
      top: 0;
      z-index: 100;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    /* カテゴリータブ */
    #category-tabs {
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 10px 12px 8px;
      gap: 8px;
    }
    #category-tabs::-webkit-scrollbar {
      display: none;
    }

    .tab-btn {
      flex-shrink: 0;
      border: 2px solid transparent;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
      background: #f0f0f0;
      color: #444;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn:active {
      transform: scale(0.95);
    }
    .tab-btn.active {
      color: white;
      border-color: transparent;
    }

    /* 検索バー */
    #search-bar {
      padding: 6px 12px 10px;
    }
    #search-input {
      width: 100%;
      padding: 8px 14px;
      border: 2px solid #ddd;
      border-radius: 20px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    #search-input:focus {
      border-color: #5c8fc7;
    }

    /* カードグリッド */
    #card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
      padding: 14px 12px;
    }

    /* カード */
    .card {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .card:active {
      transform: scale(0.93);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .card-placeholder {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .card-label {
      text-align: center;
      padding: 8px 6px;
      font-size: 1.05rem;
      font-weight: bold;
      color: #333;
      line-height: 1.2;
    }

    /* 音声再生中のハイライト */
    .card.playing {
      outline: 3px solid #5c8fc7;
      outline-offset: 2px;
    }

    /* 結果なし */
    #no-results {
      grid-column: 1 / -1;
      text-align: center;
      color: #888;
      font-size: 1.1rem;
      padding: 40px 20px;
    }

    /* タブレット以上 */
    @media (min-width: 600px) {
      #card-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 16px;
        padding: 18px 20px;
      }
      .card-label {
        font-size: 1.15rem;
        padding: 10px 8px;
      }
    }

    @media (min-width: 900px) {
      #card-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      }
    }
  </style>
</head>
<body>

<header>ことばカード</header>

<div id="controls">
  <div id="category-tabs"></div>
  <div id="search-bar">
    <input type="search" id="search-input" placeholder="🔍 さがす..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
</div>

<main id="card-grid"></main>

<script>
  // カテゴリーごとの絵文字（JSONにないのでここで定義）
  const CATEGORY_EMOJI = {
    drink:   '🥤',
    food:    '🍎',
    play:    '⚽',
    place:   '🏠',
    feeling: '😊'
  };

  let allCards = [];
  let allCategories = [];
  const state = { activeCategory: 'all', searchQuery: '' };

  // --- データ読み込み ---
  fetch('./cards.json')
    .then(r => r.json())
    .then(data => {
      allCategories = data.categories;
      allCards = data.cards;
      renderTabs();
      renderCards();
    })
    .catch(() => {
      document.getElementById('card-grid').innerHTML =
        '<p id="no-results">カードデータを読み込めませんでした。</p>';
    });

  // --- タブ生成 ---
  function renderTabs() {
    const container = document.getElementById('category-tabs');
    const tabs = [{ id: 'all', label: '全部', color: '#5c8fc7' }, ...allCategories];
    container.innerHTML = tabs.map(cat => {
      const emoji = cat.id === 'all' ? '📋' : (CATEGORY_EMOJI[cat.id] || '');
      const isActive = state.activeCategory === cat.id;
      const bg = isActive ? cat.color : '';
      return `<button class="tab-btn${isActive ? ' active' : ''}"
        style="${isActive ? `background:${cat.color};` : ''}"
        data-id="${cat.id}" data-color="${cat.color}"
        onclick="selectCategory('${cat.id}', '${cat.color}')">
        ${emoji} ${cat.label}
      </button>`;
    }).join('');
  }

  function selectCategory(id, color) {
    state.activeCategory = id;
    renderTabs();
    renderCards();
  }

  // --- 検索 ---
  document.getElementById('search-input').addEventListener('input', e => {
    state.searchQuery = e.target.value;
    renderCards();
  });

  // --- カードフィルタリング ---
  function getFilteredCards() {
    const query = state.searchQuery.trim().toLowerCase();
    return allCards.filter(card => {
      const catMatch = state.activeCategory === 'all' || card.category === state.activeCategory;
      const searchMatch = query === '' ||
        card.label.includes(query) ||
        (card.tags || []).some(t => t.includes(query));
      return catMatch && searchMatch;
    });
  }

  // --- カードレンダリング ---
  function renderCards() {
    const filtered = getFilteredCards();
    const grid = document.getElementById('card-grid');

    if (filtered.length === 0) {
      grid.innerHTML = '<p id="no-results">カードがみつかりません 🔍</p>';
      return;
    }

    const catMap = {};
    allCategories.forEach(c => { catMap[c.id] = c; });

    grid.innerHTML = filtered.map(card => {
      const cat = catMap[card.category] || {};
      const color = cat.color || '#ccc';
      const lightBg = hexToRgba(color, 0.15);

      let imageHtml;
      if (card.image) {
        imageHtml = `<img class="card-image" src="${card.image}" alt="${card.label}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
          <div class="card-placeholder" style="background:${lightBg};display:none;">${CATEGORY_EMOJI[card.category] || '📷'}</div>`;
      } else {
        imageHtml = `<div class="card-placeholder" style="background:${lightBg};">${CATEGORY_EMOJI[card.category] || '📷'}</div>`;
      }

      return `<div class="card" data-id="${card.id}" onclick="handleCardTap('${card.id}', this)">
        ${imageHtml}
        <div class="card-label">${card.label}</div>
      </div>`;
    }).join('');
  }

  // --- カードタップ ---
  function handleCardTap(cardId, el) {
    const card = allCards.find(c => c.id === cardId);
    if (!card) return;

    // ハイライト
    document.querySelectorAll('.card.playing').forEach(c => c.classList.remove('playing'));
    el.classList.add('playing');
    setTimeout(() => el.classList.remove('playing'), 1500);

    playCard(card);
  }

  // --- 音声再生 ---
  function playCard(card) {
    if (card.sound) {
      const audio = new Audio(card.sound);
      audio.play().catch(() => speakText(card.speechText));
    } else {
      speakText(card.speechText);
    }
  }

  function speakText(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ja-JP';
    utt.rate = 0.85;
    utt.pitch = 1.1;
    window.speechSynthesis.speak(utt);
  }

  // --- ユーティリティ ---
  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
</script>
</body>
</html>
